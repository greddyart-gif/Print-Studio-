<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Print Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .chat-container {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    height: 90vh;
    min-height: 500px;
    overflow: hidden;
  }

  .chat-header {
    background: #C0392B;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ps-logo {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .header-info p { font-size: 16px; font-weight: 600; color: #fff; }
  .header-info span { font-size: 12px; color: rgba(255,255,255,0.75); }

  .status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.85);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2ecc71;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #fafafa;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .msg { display: flex; gap: 10px; max-width: 82%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.agent { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.agent-av { background: #C0392B; color: #fff; }
  .avatar.user-av { background: #2980b9; color: #fff; }

  .bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.agent .bubble {
    background: #fff;
    color: #2d2d2d;
    border: 1px solid #e8e8e8;
    border-radius: 4px 16px 16px 16px;
  }
  .msg.user .bubble {
    background: #C0392B;
    color: #fff;
    border-radius: 16px 4px 16px 16px;
  }

  .source-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: #f0f0f0;
    color: #888;
    border: 1px solid #e0e0e0;
  }

  .typing {
    display: flex; align-items: center; gap: 5px;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 4px 16px 16px 16px;
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #C0392B; opacity: 0.5;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

  .quick-section {
    padding: 10px 16px 6px;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
  }
  .quick-label { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .qbtn {
    font-size: 12px; padding: 6px 13px;
    border-radius: 99px;
    border: 1px solid #ddd;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .qbtn:hover { border-color: #C0392B; color: #C0392B; background: #fff5f5; }

  .input-area {
    padding: 12px 16px;
    border-top: 1px solid #ebebeb;
    display: flex; gap: 10px; align-items: flex-end;
    background: #fff;
  }

  #chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 110px;
    outline: none;
    color: #2d2d2d;
    background: #fafafa;
    transition: border-color .2s;
    line-height: 1.5;
  }
  #chat-input:focus { border-color: #C0392B; background: #fff; }

  #send-btn {
    width: 44px; height: 44px;
    background: #C0392B;
    border: none; border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s; flex-shrink: 0;
  }
  #send-btn:hover { opacity: .87; }
  #send-btn:disabled { opacity: .35; cursor: default; }
  #send-btn svg { width: 20px; height: 20px; fill: #fff; }

  .disclaimer {
    text-align: center;
    font-size: 10px;
    color: #bbb;
    padding: 6px;
    background: #fff;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="ps-logo">PS</div>
    <div class="header-info">
      <p>Agente Print Studio</p>
      <span>Asistente técnico de producción</span>
    </div>
    <div class="status">
      <div class="dot"></div>
      En línea
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-section" id="quick-section">
    <div class="quick-label">Consultas frecuentes</div>
    <div class="quick-btns">
      <button class="qbtn" onclick="sendQuick('¿Cómo calibro la temperatura de sellado en la bolseadora?')">Temperatura sellado</button>
      <button class="qbtn" onclick="sendQuick('La flexo de tambor central está generando repinte, ¿qué hago?')">Repinte en flexo</button>
      <button class="qbtn" onclick="sendQuick('El troquel está saliendo desalineado respecto a la impresión')">Troquel desalineado</button>
      <button class="qbtn" onclick="sendQuick('El fondo del vaso está saliendo mal sellado')">Fondo de vaso</button>
      <button class="qbtn" onclick="sendQuick('¿Cuál es el partido de fútbol de hoy?')">Fuera de tema</button>
    </div>
  </div>

  <div class="input-area">
    <textarea id="chat-input" placeholder="Escribe tu consulta técnica..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="disclaimer">Solo para uso interno — Print Studio Guatemala</div>
</div>

<script>
const API_KEY = "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";

const KNOWLEDGE = [
  { maquina:"Bolseadora", categoria:"Parámetros", titulo:"Temperatura de sellado", descripcion:"La temperatura correcta de sellado depende del tipo de material. Para polietileno de baja densidad usar entre 160°C y 180°C. Para laminados metalizados entre 140°C y 160°C. Verificar siempre con una bolsa de prueba antes de producción.", parametros:"Polietileno BD: 160-180°C | Laminado metalizado: 140-160°C | Tiempo de sellado: 0.8-1.2 seg", palabras:["sellado","temperatura","bolseadora","calor","resistencia","sello","fondo"] },
  { maquina:"Impresora Flexo Tambor Central", categoria:"Defectos", titulo:"Repinte o manchado entre colores", descripcion:"El repinte ocurre cuando la tinta de un color transfiere a otro. Causas: velocidad de secado insuficiente, temperatura de túnel baja, viscosidad de tinta incorrecta o presión excesiva. Pasos: 1. Reducir velocidad 10%. 2. Aumentar temperatura de secado 5°C. 3. Verificar viscosidad con copa Zahn (18-22 seg). 4. Revisar presión de impresión.", parametros:"Viscosidad tinta: 18-22 seg (Copa Zahn 2) | Temp secado: 55-65°C", palabras:["repinte","mancha","manchado","flexo","tinta","color","tambor central","secado"] },
  { maquina:"Troqueladora", categoria:"Ajuste", titulo:"Troquel desalineado respecto a impresión", descripcion:"Cuando el troquel no coincide con la impresión: 1. Verificar registro de alimentación de pliego. 2. Revisar desgaste de topes laterales. 3. Calibrar mordazas. 4. Si el desalineamiento supera 1.5mm, detener y llamar al mecánico.", parametros:"Tolerancia máxima: ±0.5mm | Si supera 1.5mm: paro de máquina", palabras:["troquel","desalineado","troqueladora","registro","corte","suaje","mordaza"] },
  { maquina:"Formadora de Vasos", categoria:"Defecto", titulo:"Fondo de vaso mal sellado", descripcion:"Fondo mal sellado puede ser por temperatura insuficiente, presión de molde baja o material fuera de especificación. Pasos: 1. Verificar temperatura de fondo (180-200°C). 2. Revisar presión de molde (mín 4 bar). 3. Prueba de vacío en 5 vasos. 4. Si continúa, revisar resistencia con multímetro.", parametros:"Temp fondo: 180-200°C | Presión molde: mín 4 bar | Prueba vacío: 5 muestras", palabras:["vaso","fondo","formadora","fuga","presión","molde","resistencia"] },
  { maquina:"Máquina de Bolsas de Papel", categoria:"Proceso", titulo:"Encolado deficiente en bolsa de papel", descripcion:"El encolado deficiente ocurre por temperatura de cola incorrecta, boquilla obstruida o papel fuera de humedad. Verificar: 1. Temperatura de cola 150-170°C. 2. Limpiar boquilla cada 2 horas. 3. Humedad del papel 5-8%. 4. Presión de rodillo 2.5-3 bar.", parametros:"Temp cola: 150-170°C | Humedad papel: 5-8% | Presión rodillo: 2.5-3 bar", palabras:["bolsa papel","encolado","cola","pegado","boquilla","adhesivo","papel"] },
  { maquina:"Impresora Offset", categoria:"Defecto", titulo:"Desregistro entre colores offset", descripcion:"El desregistro se manifiesta como bordes borrosos o colores desplazados. Pasos: 1. Verificar tensión de papel. 2. Revisar estado de mantilla (cambiar si supera 500,000 impresiones). 3. Ajustar tornillos de registro lateral y frontal. 4. Imprimir hoja de registro y medir con lupa 10x.", parametros:"Tolerancia: ±0.1mm | Vida útil mantilla: 500,000 imp", palabras:["registro","offset","desregistro","color","plancha","mantilla","borroso"] }
];

const SYSTEM_PROMPT = `Eres el Agente Técnico de Producción de Print Studio Guatemala, una litografía con más de 25 años de experiencia especializada en impresión offset, flexografía, empaques y bolsas de papel, con certificaciones SMETA 4 Pilares y Walmart Factory.

Tu función es ayudar a los operadores a resolver dudas técnicas sobre máquinas y procesos de producción.

MÁQUINAS EN PLANTA:
- Impresoras Offset (5 y 6 colores)
- Impresora Flexo de Tambor Central
- Trocadoras / Suajadoras
- Cortadoras
- Bolseadoras
- Formadoras de Vasos
- Máquina de Bolsas de Papel

BASE DE CONOCIMIENTO INTERNA:
${JSON.stringify(KNOWLEDGE, null, 2)}

REGLAS ESTRICTAS:
1. Si la pregunta NO está relacionada con producción, máquinas, defectos, ajustes o procesos de Print Studio, responde ÚNICAMENTE: "Solo puedo ayudarte con temas relacionados a los procesos y máquinas de Print Studio. ¿Tienes alguna duda sobre producción, defectos o ajustes de máquina?"
2. Busca primero en la base de conocimiento interna. Si no hay suficiente información, complementa con conocimiento técnico de la industria litográfica y flexográfica.
3. Responde en lenguaje simple y claro, como si le explicaras a un operador de planta.
4. Menciona parámetros técnicos cuando los conozcas con certeza.
5. Si el problema es crítico (tolerancias excedidas, riesgo de daño), indica claramente que debe llamar al mecánico o supervisor.
6. Máximo 5 pasos si es un procedimiento. Sé conciso pero completo.
7. Nunca inventes parámetros técnicos que no conozcas.`;

const history = [];

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addMsg(role, text, source) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user' : 'agent'}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'user-av' : 'agent-av'}`;
  av.textContent = role === 'user' ? 'OP' : 'PS';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = escapeHtml(text);

  if (source) {
    const tag = document.createElement('span');
    tag.className = 'source-tag';
    tag.textContent = source;
    bubble.appendChild(document.createElement('br'));
    bubble.appendChild(tag);
  }

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg agent';
  wrap.id = 'typing-ind';
  const av = document.createElement('div');
  av.className = 'avatar agent-av';
  av.textContent = 'PS';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(t);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-ind');
  if (t) t.remove();
}

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  const reply = data.content?.find(b => b.type === 'text')?.text || 'No pude procesar tu consulta.';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  document.getElementById('quick-section').style.display = 'none';
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMsg('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();
    const isOffTopic = reply.startsWith('Solo puedo ayudarte');
    const fromKB = KNOWLEDGE.some(k => k.palabras.some(p => text.toLowerCase().includes(p)));
    const source = isOffTopic ? null : (fromKB ? '📋 Base de conocimiento Print Studio' : '🌐 Conocimiento técnico de la industria');
    addMsg('agent', reply, source);
  } catch(e) {
    removeTyping();
    addMsg('agent', '❌ Error al conectar con el agente: ' + e.message);
  }

  btn.disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMsg();
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

addMsg('agent', '¡Hola! Soy el agente técnico de Print Studio.\n\nPuedo ayudarte con dudas sobre máquinas, defectos de impresión, ajustes de proceso y procedimientos de producción.\n\n¿En qué te puedo ayudar hoy?');
</script>
</body>
</html>
